<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickster Vault | Pro Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-red: #ff0000; --bg-dark: #0a0505; --card-bg: #160d0d; --text-main: white; --border-color: #2a1a1a; --header-bg: rgba(10, 5, 5, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; transition: 0.3s; }
        h1, h2, h3, .logo-text { font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }
        body { background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--primary-red); width: 100%; max-width: 400px; text-align: center; }
        header { position: fixed; top: 0; width: 100%; height: 60px; display: none; align-items: center; justify-content: space-between; padding: 0 15px; background: var(--header-bg); z-index: 1000; border-bottom: 2px solid var(--primary-red); }
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: var(--card-bg); border-right: 2px solid var(--primary-red); padding-top: 70px; z-index: 1050; }
        .sidebar.active { left: 0; }
        .sidebar a { padding: 15px 25px; text-decoration: none; color: white; display: block; border-bottom: 1px solid var(--border-color); font-family: 'Bebas Neue'; }
        .page-content { display: none; padding: 75px 4% 40px; min-height: 100vh; }
        .active-page { display: block; animation: fadeIn 0.4s; }
        .slider-wrapper { width: 100%; height: 190px; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid var(--border-color); margin-bottom: 15px; }
        .slides { display: flex; height: 100%; transition: 1s ease-in-out; }
        .slide { min-width: 100%; background-size: cover; background-position: center; }
        .home-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .full-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; text-align: center; padding-bottom: 5px; cursor: pointer; }
        .card img { width: 100%; height: 75px; object-fit: cover; }
        .card b { font-size: 9px; display: block; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .view-all { color: red; font-size: 0.7rem; cursor: pointer; font-weight: bold; }
        input, select, textarea, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: #000; color: white; }
        button { background: var(--primary-red); color: white; font-family: 'Bebas Neue'; cursor: pointer; border: none; font-size: 1.1rem; }
        .stat-card { background: linear-gradient(45deg, #ff0000, #8b0000); padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        .user-row { background: #111; padding: 10px; border-radius: 5px; margin-bottom: 5px; border-left: 3px solid red; font-size: 0.8rem; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box" id="login-form">
            <h1 style="color:red; font-size:2.5rem;">MICKSTER VAULT</h1>
            <input type="email" id="logEmail" placeholder="Email">
            <input type="password" id="logPass" placeholder="Password">
            <button onclick="handleLogin()">LOG IN</button>
            <p style="margin-top:15px; font-size:0.75rem;">
                <a href="https://wa.me/255619578699?text=forgot%20password" style="color:gray; text-decoration:none;">Forgot password?</a>
            </p>
            <p style="margin-top:10px; font-size:0.8rem;">No account? <span style="color:red; cursor:pointer;" onclick="toggleAuth()">Register</span></p>
        </div>
        <div class="auth-box" id="reg-form" style="display:none;">
            <h1 style="color:red;">REGISTER</h1>
            <input type="text" id="regName" placeholder="Full Name">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPass" placeholder="Password">
            <button onclick="handleRegister()">CREATE ACCOUNT</button>
            <p onclick="toggleAuth()" style="margin-top:15px; font-size:0.8rem; cursor:pointer;">Have account? <span style="color:red;">Log in</span></p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header id="app-header">
            <div style="display:flex; align-items:center;">
                <div style="cursor:pointer; font-size:24px; color:red;" onclick="document.getElementById('sidebar').classList.toggle('active')">☰</div>
                <div class="logo-text" style="margin-left:15px; font-size:1.4rem;">MICKSTER VAULT</div>
            </div>
            <div style="font-size: 0.7rem; color:red; cursor:pointer;" onclick="handleLogout()">LOGOUT</div>
        </header>

        <div class="sidebar" id="sidebar">
            <a href="#" onclick="showPage('home-page')">🏠 HOME</a>
            <a href="#" onclick="showPage('market-menu-page')">⚽ MARKET</a>
            <a href="#" onclick="showPage('android-page')">📱 ANDROID</a>
            <a href="#" onclick="showPage('pc-page')">💻 PC GAMES</a>
            <a href="#" onclick="showPage('admin-login-page')">🛠️ ADMIN</a>
        </div>

        <div id="home-page" class="page-content active-page">
            <input type="text" style="margin-bottom:15px; border-radius:20px;" placeholder="Search..." onkeyup="filterGames(this.value, 'home')">
            <div class="slider-wrapper"><div class="slides" id="mainSlider"></div></div>
            
            <div class="section-header">
                <h3>ANDROID</h3>
                <span class="view-all" onclick="showPage('android-page')">VIEW ALL</span>
            </div>
            <div id="home-android-grid" class="home-grid"></div>
            
            <div class="section-header">
                <h3>PC GAMES</h3>
                <span class="view-all" onclick="showPage('pc-page')">VIEW ALL</span>
            </div>
            <div id="home-pc-grid" class="home-grid"></div>
            
            <button style="background:darkred; padding:15px; margin-top:20px;" onclick="showPage('market-menu-page')">⚽ EFOOTBALL MARKET</button>
        </div>

        <div id="market-menu-page" class="page-content">
            <button onclick="showPage('home-page')" style="width:auto; background:#333; padding:5px 15px; margin-bottom:15px;">← BACK</button>
            <h1 style="text-align:center; color:red;">MARKET</h1>
            <button style="height:80px; font-size:1.5rem;" onclick="showPage('efootball-list-page')">NUNUA KIKOSI</button>
            <button style="height:80px; font-size:1.5rem; background:green;" onclick="window.open('https://wa.me/255619578699?text=Nahitaji kuuza kikosi')">UZA KIKOSI</button>
        </div>

        <div id="efootball-list-page" class="page-content"><button onclick="showPage('market-menu-page')" style="width:auto; background:#333; padding:5px 15px;">← BACK</button><div id="efootball-grid" class="full-grid" style="margin-top:15px;"></div></div>
        <div id="android-page" class="page-content"><button onclick="showPage('home-page')" style="width:auto; background:#333; padding:5px 15px;">← BACK</button><div id="android-grid" class="full-grid" style="margin-top:15px;"></div></div>
        <div id="pc-page" class="page-content"><button onclick="showPage('home-page')" style="width:auto; background:#333; padding:5px 15px;">← BACK</button><div id="pc-grid" class="full-grid" style="margin-top:15px;"></div></div>

        <div id="admin-login-page" class="page-content">
            <div style="max-width:350px; margin:auto;"><h1 style="color:orange; text-align:center;">ADMIN</h1><input type="text" id="admUser" placeholder="Username"><input type="password" id="admPass" placeholder="Password"><button onclick="verifyAdmin()" style="background:orange; color:black;">ENTER PANEL</button></div>
        </div>

        <div id="admin-page" class="page-content">
            <div class="stat-card" onclick="showPage('manage-all-page')"><p>TOTAL USERS</p><h1 id="userCount">0</h1></div>
            
            <div style="background:#111; padding:15px; border-radius:10px; border:1px solid #333; margin-bottom:20px;">
                <h3>SLIDER PANEL (5 IMAGES)</h3>
                <input type="text" class="sl-in" placeholder="Image URL 1">
                <input type="text" class="sl-in" placeholder="Image URL 2">
                <input type="text" class="sl-in" placeholder="Image URL 3">
                <input type="text" class="sl-in" placeholder="Image URL 4">
                <input type="text" class="sl-in" placeholder="Image URL 5">
                <button onclick="saveSlider()" style="background:orange; color:black;">UPDATE SLIDER</button>
            </div>

            <div style="background:#111; padding:15px; border-radius:10px; border:1px solid #333; margin-bottom:20px;">
                <h3>UPLOAD GAME</h3>
                <select id="gCat"><option value="android">ANDROID</option><option value="pc">PC</option></select>
                <input type="text" id="gName" placeholder="Name">
                <input type="text" id="gIcon" placeholder="Icon URL">
                <textarea id="gInfo" placeholder="Description"></textarea>
                
                <select id="linkType" onchange="toggleLinkInputs()">
                    <option value="single">Single Link (Moja tu)</option>
                    <option value="pack">Pack (APK, OBB, DATA)</option>
                </select>

                <div id="singleLinkBox"><input type="text" id="gLink" placeholder="Download Link"></div>
                <div id="packLinkBox" style="display:none; border:1px dashed red; padding:10px; margin-top:10px;">
                    <input type="text" id="apkL" placeholder="APK Link">
                    <input type="text" id="obbL" placeholder="OBB Link">
                    <input type="text" id="datL" placeholder="DATA Link">
                </div>
                <button onclick="upload('game')">UPLOAD</button>
            </div>
            
            <div style="background:#111; padding:15px; border-radius:10px; border:1px solid #25d366;"><h3 style="color:#25d366;">MARKET UPLOAD</h3><input type="text" id="eName" placeholder="Squad Name"><input type="text" id="eIcon" placeholder="Squad Image URL"><textarea id="eDesc" placeholder="Details & Price"></textarea><input type="text" id="eLink" placeholder="WA Link"><button onclick="upload('efoot')" style="background:#25d366;">POST SQUAD</button></div>
        </div>

        <div id="manage-all-page" class="page-content"><button onclick="showPage('admin-page')" style="width:auto; padding:5px 15px;">← BACK</button><div id="user-details-list"></div><div id="delete-master-list"></div></div>
        <div id="detail-page" class="page-content"><button onclick="goBack()" style="width:auto; padding:5px 15px; margin-bottom:15px;">← BACK</button><div id="detail-content"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDiNjWTVcqZYsiHDWyxvU35qoAakwhFZKk", authDomain: "mickster-vault.firebaseapp.com", databaseURL: "https://mickster-vault-default-rtdb.firebaseio.com", projectId: "mickster-vault", storageBucket: "mickster-vault.firebasestorage.app", messagingSenderId: "642049778492", appId: "1:642049778492:web:ca1ab399d3a5ac4a353439" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);
        let allData = []; let prevPage = 'home-page';

        window.toggleLinkInputs = () => {
            const isPack = document.getElementById('linkType').value === 'pack';
            document.getElementById('packLinkBox').style.display = isPack ? 'block' : 'none';
            document.getElementById('singleLinkBox').style.display = isPack ? 'none' : 'block';
        };

        window.verifyAdmin = () => { if(document.getElementById('admUser').value === "Mickster19" && document.getElementById('admPass').value === "$120") showPage('admin-page'); else alert("Wrong!"); };

        window.saveSlider = () => {
            const urls = Array.from(document.querySelectorAll('.sl-in')).map(i => i.value).filter(v => v !== "");
            set(ref(db, 'slider/'), urls).then(() => alert("Updated!"));
        };

        onValue(ref(db, 'slider/'), (s) => {
            const imgs = s.val() || ["https://via.placeholder.com/800x400"];
            document.getElementById('mainSlider').innerHTML = imgs.map(url => `<div class="slide" style="background-image:url('${url}')"></div>`).join('');
            let cur = 0; clearInterval(window.slInt);
            window.slInt = setInterval(() => { cur = (cur + 1) % imgs.length; const sl = document.getElementById('mainSlider'); if(sl) sl.style.transform = `translateX(-${cur * 100}%)`; }, 4000);
        });

        window.upload = (m) => {
            const isP = document.getElementById('linkType').value === 'pack';
            const data = m === 'game' ? {
                name: document.getElementById('gName').value, icon: document.getElementById('gIcon').value, desc: document.getElementById('gInfo').value, cat: document.getElementById('gCat').value,
                type: isP ? 'pack' : 'single', link: isP ? '' : document.getElementById('gLink').value, apk: isP ? document.getElementById('apkL').value : '', obb: isP ? document.getElementById('obbL').value : '', dat: isP ? document.getElementById('datL').value : ''
            } : { name: document.getElementById('eName').value, icon: document.getElementById('eIcon').value, desc: document.getElementById('eDesc').value, link: document.getElementById('eLink').value, cat: 'efootball', type: 'single' };
            push(ref(db, 'games/'), data).then(() => alert("Success!"));
        };

        // ILIBORESHWA: Sasa unaweza kudelete User
        onValue(ref(db, 'users/'), (s) => {
            const users = s.val() || {}; document.getElementById('userCount').innerText = Object.keys(users).length;
            const det = document.getElementById('user-details-list'); det.innerHTML = "<h2>USERS</h2>";
            for(let id in users) {
                det.innerHTML += `
                <div class="user-row" style="display:flex; justify-content:space-between; align-items:center;">
                    <div>${users[id].name}<br>${users[id].email}<br><span style="color:yellow">PASS: ${users[id].pass}</span></div>
                    <button style="width:auto; padding:5px 10px; background:red; margin:0;" onclick="removeItem('users/${id}')">DELETE</button>
                </div>`;
            }
        });

        onValue(ref(db, 'games/'), (s) => {
            allData = s.val() ? Object.keys(s.val()).map(id => ({...s.val()[id], fbId: id})) : [];
            renderGrids(allData);
            const delM = document.getElementById('delete-master-list'); delM.innerHTML = "<h2 style='margin-top:20px;'>MANAGE CONTENT</h2>";
            allData.forEach(item => { delM.innerHTML += `<div class="user-row" style="display:flex; justify-content:space-between;"><span>${item.name}</span><button style="width:auto; padding:2px 10px; background:red; margin:0;" onclick="removeItem('games/${item.fbId}')">DEL</button></div>`; });
        });

        const renderGrids = (data) => {
            const hA = document.getElementById('home-android-grid'), hP = document.getElementById('home-pc-grid'), eG = document.getElementById('efootball-grid'), aG = document.getElementById('android-grid'), pG = document.getElementById('pc-grid');
            [hA, hP, eG, aG, pG].forEach(el => { if(el) el.innerHTML = ""; });
            
            let aCount = 0, pCount = 0;
            data.slice().reverse().forEach(item => {
                const card = `<div class="card" onclick="openItem('${item.fbId}')"><img src="${item.icon}"><b>${item.name}</b></div>`;
                if(item.cat === 'android') { 
                    if(aG) aG.innerHTML += card; 
                    if(hA && aCount < 3) { hA.innerHTML += card; aCount++; } 
                }
                if(item.cat === 'pc') { 
                    if(pG) pG.innerHTML += card; 
                    if(hP && pCount < 3) { hP.innerHTML += card; pCount++; } 
                }
                if(item.cat === 'efootball') { if(eG) eG.innerHTML += card; }
            });
        };

        window.openItem = (id) => {
            const item = allData.find(x => x.fbId === id);
            let btnLabel = item.cat === 'efootball' ? "BUY NOW" : "DOWNLOAD NOW";
            
            let btns = item.type === 'pack' ? 
                `<button style="background:#444;" onclick="window.open('${item.apk}')">DOWNLOAD APK</button>
                 <button style="background:#444;" onclick="window.open('${item.obb}')">DOWNLOAD OBB</button>
                 <button style="background:#444;" onclick="window.open('${item.dat}')">DOWNLOAD DATA</button>` :
                `<button style="background:green;" onclick="window.open('${item.link}')">${btnLabel}</button>`;
            
            document.getElementById('detail-content').innerHTML = `<img src="${item.icon}" style="width:100%; border-radius:12px;"><h1 style="color:red; margin-top:15px;">${item.name}</h1><p style="margin:15px 0; white-space:pre-wrap;">${item.desc}</p>${btns}`;
            showPage('detail-page');
        };

        window.toggleAuth = () => { document.getElementById('login-form').style.display = document.getElementById('login-form').style.display === 'none' ? 'block' : 'none'; document.getElementById('reg-form').style.display = document.getElementById('reg-form').style.display === 'none' ? 'block' : 'none'; };
        window.handleRegister = () => { const n = document.getElementById('regName').value, e = document.getElementById('regEmail').value, p = document.getElementById('regPass').value; if(e && p) push(ref(db, 'users/'), { name: n, email: e, pass: p }).then(() => { alert("Done!"); toggleAuth(); }); };
        window.handleLogin = () => { const e = document.getElementById('logEmail').value, p = document.getElementById('logPass').value; get(ref(db, 'users/')).then(s => { const users = s.val(); let f = false; for(let id in users) if(users[id].email === e && users[id].pass === p) f = true; if(f) { document.getElementById('auth-screen').style.display='none'; document.getElementById('main-app').style.display='block'; document.getElementById('app-header').style.display='flex'; } else alert("Wrong!"); }); };
        
        window.handleLogout = () => {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('app-header').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('logEmail').value = '';
            document.getElementById('logPass').value = '';
        };

        window.showPage = (id) => { if(id !== 'detail-page' && id !== 'manage-all-page' && id !== 'admin-login-page') prevPage = id; document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); document.getElementById('sidebar').classList.remove('active'); };
        window.goBack = () => showPage(prevPage);
        window.removeItem = (p) => { if(confirm("Are you sure you want to delete this?")) remove(ref(db, p)); };
        window.filterGames = (q, c) => { const filtered = allData.filter(i => i.name.toLowerCase().includes(q.toLowerCase())); renderGrids(filtered); };
    </script>
</body>
</html>
